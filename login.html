<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - LifeFlow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 36px;
            color: #667eea;
            margin-bottom: 10px;
        }
        .logo p {
            color: #7F8C8D;
            font-size: 14px;
        }
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #E0E6ED;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: #7F8C8D;
            font-weight: 600;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2C3E50;
            font-weight: 600;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #E0E6ED;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }
        .form-content {
            display: none;
        }
        .form-content.active {
            display: block;
        }
        .error {
            color: #E74C3C;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        .success {
            color: #27AE60;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🌟 LifeFlow</h1>
            <p>智能生活助手</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">登录</div>
            <div class="tab" onclick="switchTab('register')">注册</div>
        </div>

        <!-- 登录表单 -->
        <div id="loginForm" class="form-content active">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" placeholder="请输入用户名" />
                <div class="error" id="loginUsernameError"></div>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码" />
                <div class="error" id="loginPasswordError"></div>
            </div>
            <button class="btn" onclick="handleLogin()">登录</button>
        </div>

        <!-- 注册表单 -->
        <div id="registerForm" class="form-content">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="registerUsername" placeholder="请输入用户名（3-20个字符）" />
                <div class="error" id="registerUsernameError"></div>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="registerPassword" placeholder="请输入密码（至少6个字符）" />
                <div class="error" id="registerPasswordError"></div>
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" id="registerPasswordConfirm" placeholder="请再次输入密码" />
                <div class="error" id="registerPasswordConfirmError"></div>
            </div>
            <button class="btn" onclick="handleRegister()">注册</button>
            <div class="success" id="registerSuccess">注册成功！正在跳转...</div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            // 切换标签
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-content').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
            
            // 清除错误信息
            document.querySelectorAll('.error, .success').forEach(e => {
                e.style.display = 'none';
                e.textContent = '';
            });
        }

        function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            // 清除之前的错误
            document.querySelectorAll('.error').forEach(e => e.style.display = 'none');
            
            // 验证
            if (!username) {
                showError('loginUsernameError', '请输入用户名');
                return;
            }
            
            if (!password) {
                showError('loginPasswordError', '请输入密码');
                return;
            }
            
            // 获取用户数据
            const users = JSON.parse(localStorage.getItem('lifeflow_users') || '{}');
            
            if (!users[username]) {
                showError('loginUsernameError', '用户名不存在');
                return;
            }
            
            if (users[username].password !== password) {
                showError('loginPasswordError', '密码错误');
                return;
            }
            
            // 登录成功
            const oldUser = localStorage.getItem('lifeflow_current_user');
            localStorage.setItem('lifeflow_current_user', username);
            
            // 如果用户切换了，触发事件
            if (oldUser && oldUser !== username) {
                window.dispatchEvent(new CustomEvent('lifeflow:user:changed', {
                    detail: { oldUser, newUser: username }
                }));
            }
            
            window.location.href = 'index.html';
        }

        function handleRegister() {
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value;
            const passwordConfirm = document.getElementById('registerPasswordConfirm').value;
            
            // 清除之前的错误
            document.querySelectorAll('.error, .success').forEach(e => e.style.display = 'none');
            
            // 验证用户名
            if (!username) {
                showError('registerUsernameError', '请输入用户名');
                return;
            }
            
            if (username.length < 3 || username.length > 20) {
                showError('registerUsernameError', '用户名长度应为3-20个字符');
                return;
            }
            
            // 验证密码
            if (!password) {
                showError('registerPasswordError', '请输入密码');
                return;
            }
            
            if (password.length < 6) {
                showError('registerPasswordError', '密码至少需要6个字符');
                return;
            }
            
            // 验证确认密码
            if (password !== passwordConfirm) {
                showError('registerPasswordConfirmError', '两次输入的密码不一致');
                return;
            }
            
            // 检查用户名是否已存在
            const users = JSON.parse(localStorage.getItem('lifeflow_users') || '{}');
            
            if (users[username]) {
                showError('registerUsernameError', '用户名已存在');
                return;
            }
            
            // 注册成功
            users[username] = {
                password: password,
                createdAt: new Date().toISOString()
            };
            
            localStorage.setItem('lifeflow_users', JSON.stringify(users));
            
            const oldUser = localStorage.getItem('lifeflow_current_user');
            localStorage.setItem('lifeflow_current_user', username);
            
            // 如果用户切换了，触发事件
            if (oldUser && oldUser !== username) {
                window.dispatchEvent(new CustomEvent('lifeflow:user:changed', {
                    detail: { oldUser, newUser: username }
                }));
            }
            
            // 显示成功消息
            document.getElementById('registerSuccess').style.display = 'block';
            
            // 跳转到首页
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        }

        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.style.display = 'block';
        }

        // 如果已登录，直接跳转
        if (localStorage.getItem('lifeflow_current_user')) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
